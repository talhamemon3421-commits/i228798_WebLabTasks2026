<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NavBar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f9fa;
      --nav-bg: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e8e8e6;
      --btn-bg: #1a1a1a;
      --btn-text: #fff;
      --hero-bg: #f0f0ee;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 2px 12px rgba(0,0,0,0.05);
    }

    [data-theme="dark"] {
      --bg: #181818;
      --nav-bg: #222;
      --text: #f0f0ee;
      --muted: #aaa;
      --border: #333;
      --btn-bg: #f0f0ee;
      --btn-text: #1a1a1a;
      --hero-bg: #222;
      --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 2px 12px rgba(0,0,0,0.2);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    /* NAV */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: background 0.3s, border-color 0.3s;
    }

    nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-links a:hover {
      color: var(--text);
      background: var(--border);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .theme-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 8px;
      padding: 0.38rem 0.75rem;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, opacity 0.15s;
    }

    .theme-btn:hover { opacity: 0.8; }

    .hamburger {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      width: 34px;
      height: 34px;
      font-size: 1rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hamburger { display: flex; }

      .nav-links {
        display: none;
        position: absolute;
        top: 60px;
        left: 0; right: 0;
        background: var(--nav-bg);
        border-bottom: 1px solid var(--border);
        flex-direction: column;
        align-items: stretch;
        padding: 0.5rem 1.5rem 1rem;
        gap: 0.1rem;
        animation: slideDown 0.2s ease;
        transition: background 0.3s;
      }

      .nav-links.open { display: flex; }

      .nav-links a {
        padding: 0.65rem 0.5rem;
        font-size: 0.9rem;
        border-radius: 0;
        border-bottom: 1px solid var(--border);
      }

      .nav-links li:last-child a { border-bottom: none; }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* HERO */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 6rem 1.5rem 4rem;
    }

    .hero-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--border);
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      max-width: 560px;
      margin-bottom: 1.2rem;
    }

    .hero p {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .cta {
      display: inline-block;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s, color 0.3s, opacity 0.15s;
    }

    .cta:hover { opacity: 0.8; }

    .hero-card {
      margin-top: 4rem;
      background: var(--nav-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      transition: background 0.3s, border-color 0.3s;
    }

    @media (max-width: 600px) {
      .hero-card { grid-template-columns: 1fr; }
    }

    .stat .num {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .stat .lbl {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a class="logo" href="#">Muhammad Talha</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <div class="nav-right">
      <button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
      <button class="theme-btn" id="themeBtn">🌙 Dark</button>
    </div>
  </nav>
</header>

<section class="hero">
  <div class="hero-tag">Welcome</div>
  <h1>Build things that matter.</h1>
  <p>A clean, responsive layout demonstrating light and dark theme switching with a fully functional mobile navigation menu.</p>
  <a class="cta" href="#">Get Started</a>

  <div class="hero-card">
    <div class="stat"><div class="num">22i-8798</div><div class="lbl">Roll Number</div></div>
    <div class="stat"><div class="num">MERN</div><div class="lbl">Stack</div></div>
    <div class="stat"><div class="num">CS</div><div class="lbl">Department</div></div>
  </div>
</section>

<script>
  const html       = document.documentElement;
  const themeBtn   = document.getElementById('themeBtn');
  const hamburger  = document.getElementById('hamburger');
  const navLinks   = document.getElementById('navLinks');

  // Load saved theme
  const saved = localStorage.getItem('theme') || 'light';
  setTheme(saved);

  function setTheme(t) {
    html.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark';
    localStorage.setItem('theme', t);
  }

  themeBtn.addEventListener('click', () => {
    setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('open');
    hamburger.textContent = navLinks.classList.contains('open') ? '✕' : '☰';
  });

  // Close menu on resize to desktop
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      navLinks.classList.remove('open');
      hamburger.textContent = '☰';
    }
  });

  // Close menu when a link is clicked
  navLinks.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      navLinks.classList.remove('open');
      hamburger.textContent = '☰';
    });
  });
</script>
</body>
</html>
